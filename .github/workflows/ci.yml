name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    name: Frontend — Type-check, Lint, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_TRANSITX_PLATFORM_ADDRESS: GPLACEHOLDER
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_REGISTRY_CONTRACT_ID: placeholder
          NEXT_PUBLIC_ESCROW_CONTRACT_ID: placeholder

  backend:
    name: Backend — Type-check, Lint, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/transitx_test
          JWT_SECRET: test-secret-min-32-chars-long-here
          STELLAR_NETWORK: testnet
          NODE_ENV: test

  contracts:
    name: Contracts — Build & Test (Soroban)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Run tests
        run: cargo test

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release
